version: '3.8'

services:
  mydogspace-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mydogspace-api
    restart: unless-stopped

    ports:
      - "8080:8080"    # HTTP порт для API

    environment:
      # ASP.NET Core настройки
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080

      # База данных (SQLite)
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/MyDogSpace.db;Foreign Keys=True

      # Логирование
      - Logging__LogLevel__Default=Information
      - Logging__LogLevel__Microsoft.AspNetCore=Warning

    volumes:
      # Постоянное хранилище для SQLite базы данных
      - ./Infrastructure/DB_Storage:/app/data:rw

    networks:
      - mydogspace-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Сеть для изоляции контейнеров
networks:
  mydogspace-network:
    driver: bridge
    name: mydogspace-network
